<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --oro: #FFD700; --azul: #003366; --verde: #4CAF50; --amarillo: #FFC107; --rojo: #F44336; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--azul); color: white; margin: 0; padding: 10px; }
        
        h1 { color: var(--oro); text-align: center; font-size: 1.5rem; margin: 15px 0; }
        
        /* Layout adaptativo */
        .container { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { .container { flex-direction: row; } }

        .col-tabla { flex: 1; }
        .col-partidos { flex: 2; }

        .card { background: white; color: #333; padding: 10px; margin: 6px 0; border-radius: 6px; border-left: 8px solid #ccc; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .verde { border-left-color: var(--verde); background: #c8e6c9; }
        .amarillo { border-left-color: var(--amarillo); background: #fff9c4; }
        .rojo { border-left-color: var(--rojo); background: #ffcdd2; }
        
        input { width: 40px; padding: 6px; text-align: center; border: 1px solid #aaa; border-radius: 4px; }
        button { padding: 6px 10px; cursor: pointer; background: var(--azul); color: white; border: none; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; background: white; color: #333; border-radius: 8px; overflow: hidden; font-size: 0.85rem; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; }
        .mi-perfil { background-color: #bbdefb !important; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏆 Quiniela Mundial 2026</h1>

    <div class="container">
        <div class="col-tabla">
            <table id="tabla-ranking">
                <thead><tr><th>#</th><th>Jugador</th><th>Pts</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="col-partidos" id="lista-partidos-detalle"></div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://rzgwfxxlmurjbwwpmqnb.supabase.co', 'sb_publishable_5_TPtoFxBvCifDDpzsDO0g_nS4mBnzD');
        const params = new URLSearchParams(window.location.search);
        const miNombre = params.get('nombre') || "Emmanuel";
        const perfilVisitado = params.get('perfil') || miNombre;
        const esSoloLectura = (miNombre !== perfilVisitado) || (params.get('modo') === 'tele');

        async function cargarTodo() {
            const { data: pronosticos } = await supabaseClient.from('pronosticos').select('*');
            const { data: partidos } = await supabaseClient.from('partidos').select('*');
            
            // Lógica Ranking
            let ranking = {};
            pronosticos.forEach(p => {
                const real = partidos.find(i => i.id === p.partido_id && i.goles_local !== null);
                if (!real) return;
                if (!ranking[p.nombre_jugador]) ranking[p.nombre_jugador] = 0;
                if (p.goles_locales === real.goles_local && p.goles_visitante === real.goles_visitante) ranking[p.nombre_jugador] += 3;
                else if ((p.goles_locales > p.goles_visitante && real.goles_local > real.goles_visitante) || (p.goles_locales < p.goles_visitante && real.goles_local < real.goles_visitante)) ranking[p.nombre_jugador] += 1;
            });

            const cuerpo = document.querySelector('#tabla-ranking tbody');
            cuerpo.innerHTML = Object.entries(ranking).sort((a,b) => b[1] - a[1]).map(([nombre, pts], i) => `
                <tr class="${nombre === perfilVisitado ? 'mi-perfil' : ''}">
                    <td>${i+1}${i==0?'🥇':i==1?'🥈':i==2?'🥉':''}</td>
                    <td><a href="?nombre=${miNombre}&perfil=${nombre}">${nombre}</a></td>
                    <td>${pts}</td>
                </tr>`).join('');

            // Lista partidos
            const cont = document.getElementById('lista-partidos-detalle');
            cont.innerHTML = partidos.map(p => {
                const pron = pronosticos.find(pr => pr.partido_id === p.id && pr.nombre_jugador === perfilVisitado);
                let clase = '';
                if (pron && p.goles_local !== null) {
                    clase = (pron.goles_locales === p.goles_local && pron.goles_visitante === p.goles_visitante) ? 'verde' : 
                            ((pron.goles_locales > pron.goles_visitante && p.goles_local > p.goles_visitante) || (pron.goles_locales < pron.goles_visitante && p.goles_local < p.goles_visitante)) ? 'amarillo' : 'rojo';
                }
                return `
                    <div class="card ${clase}">
                        <div style="flex:1">${p.equipo_local} vs ${p.equipo_visitante}</div>
                        <input type="number" class="l-${p.id}" value="${pron?.goles_locales ?? ''}" ${esSoloLectura ? 'disabled' : ''}>
                        <input type="number" class="v-${p.id}" value="${pron?.goles_visitante ?? ''}" ${esSoloLectura ? 'disabled' : ''}>
                        ${!esSoloLectura ? `<button onclick="guardar(${p.id})">✔</button>` : ''}
                    </div>`;
            }).join('');
        }

        async function guardar(id) {
            const gL = document.querySelector(`.l-${id}`).value;
            const gV = document.querySelector(`.v-${id}`).value;
            await supabaseClient.from('pronosticos').upsert({ nombre_jugador: perfilVisitado, partido_id: id, goles_locales: gL, goles_visitante: gV }, { onConflict: 'nombre_jugador,partido_id' });
            cargarTodo();
        }

        cargarTodo();
    </script>
</body>
</html>
