<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --oro: #FFD700; --azul: #003366; --verde: #4CAF50; --amarillo: #FFC107; --rojo: #F44336; }
        body { font-family: sans-serif; background: var(--azul); color: white; padding: 20px; }
        .card { background: white; color: #333; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 6px solid #ccc; display: flex; align-items: center; gap: 15px; }
        .verde { border-left-color: var(--verde); background: #e8f5e9; }
        .amarillo { border-left-color: var(--amarillo); background: #fffde7; }
        .rojo { border-left-color: var(--rojo); background: #ffebee; }
        input { width: 50px; padding: 5px; text-align: center; }
        h1 { color: var(--oro); text-align: center; }
    </style>
</head>
<body>

    <h1 id="titulo-perfil">Cargando...</h1>
    <div id="lista-partidos-detalle">Cargando todos los partidos...</div>

    <script>
        const SUPABASE_URL = 'https://rzgwfxxlmurjbwwpmqnb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5_TPtoFxBvCifDDpzsDO0g_nS4mBnzD';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const miNombre = params.get('nombre') || "Invitado";
        const perfilVisitado = params.get('perfil') || miNombre;
        const esSoloLectura = miNombre !== perfilVisitado;

        document.getElementById('titulo-perfil').innerText = `Quiniela: ${perfilVisitado}`;

        async function cargarQuiniela() {
            const { data: partidos } = await supabaseClient.from('partidos').select('*');
            const { data: pronosticos } = await supabaseClient.from('pronosticos').select('*').eq('nombre_jugador', perfilVisitado);
            
            const cont = document.getElementById('lista-partidos-detalle');
            cont.innerHTML = partidos.map(p => {
                const pron = pronosticos.find(pr => pr.partido_id === p.id);
                
                // Lógica de colores (solo si el partido tiene resultado real)
                let clase = '';
                if (pron && p.goles_local !== null) {
                    if (pron.goles_locales === p.goles_local && pron.goles_visitante === p.goles_visitante) clase = 'verde';
                    else if ((pron.goles_locales > pron.goles_visitante && p.goles_local > p.goles_visitante) || 
                             (pron.goles_locales < pron.goles_visitante && p.goles_local < p.goles_visitante)) clase = 'amarillo';
                    else clase = 'rojo';
                }

                return `
                    <div class="card ${clase}">
                        <strong style="flex-grow:1">${p.equipo_local} vs ${p.equipo_visitante}</strong>
                        <span>Real: ${p.goles_local ?? '-'} - ${p.goles_visitante ?? '-'}</span>
                        <input type="number" value="${pron?.goles_locales ?? ''}" placeholder="L" ${esSoloLectura ? 'disabled' : ''}>
                        <input type="number" value="${pron?.goles_visitante ?? ''}" placeholder="V" ${esSoloLectura ? 'disabled' : ''}>
                        ${!esSoloLectura ? `<button onclick="guardar(${p.id})">Guardar</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function guardar(partidoId) {
            // Lógica para capturar inputs de esa fila y enviar a Supabase
            alert("Guardando pronóstico para el partido: " + partidoId);
            // Aquí llamarías a supabaseClient.from('pronosticos').upsert(...)
        }

        cargarQuiniela();
    </script>
</body>
</html>
